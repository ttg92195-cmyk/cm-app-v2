# ============================================
# MovieStream App - GitHub Actions: Build Android APK
# ============================================
# This workflow builds an Android APK every time
# code is pushed to the main branch, or when
# manually triggered.
#
# APK will be available as a downloadable artifact.
# ============================================

name: Build Android APK

on:
  # Auto-run when pushing to main
  push:
    branches: [ main ]

  # Allow manual trigger from GitHub UI
  workflow_dispatch:

jobs:
  build-apk:
    name: 📱 Build Android APK
    runs-on: ubuntu-latest

    steps:
      # 1. Checkout code from repository
      - name: 📥 Checkout Code
        uses: actions/checkout@v4

      # 2. Setup Node.js
      - name: 🟢 Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'

      # 3. Setup Java JDK (required for Android build)
      - name: ☕ Setup Java JDK
        uses: actions/setup-java@v4
        with:
          distribution: 'zulu'
          java-version: '17'

      # 4. Install npm dependencies
      - name: 📦 Install Dependencies
        run: npm install

      # 5. Generate Android project with Expo Prebuild
      - name: 🔧 Expo Prebuild (Generate Android Project)
        run: npx expo prebuild --platform android --clean

      # 6. Make Gradle wrapper executable
      - name: 🔨 Setup Gradle
        working-directory: android
        run: chmod +x ./gradlew

      # 7. Build Debug APK (no signing required)
      - name: 📱 Build Debug APK
        working-directory: android
        run: ./gradlew assembleDebug --no-daemon --warning-mode all

      # 8. Upload APK as artifact (downloadable from GitHub)
      - name: 📤 Upload APK Artifact
        uses: actions/upload-artifact@v4
        with:
          name: MovieStream-Debug-APK
          path: android/app/build/outputs/apk/debug/*.apk
          retention-days: 30

      # 9. Print APK info
      - name: 📋 APK Info
        run: |
          echo "================================"
          echo "🎬 MovieStream App - Build Info"
          echo "================================"
          ls -lh android/app/build/outputs/apk/debug/*.apk
          echo "================================"
          echo "✅ APK is ready for download!"
          echo "Go to Actions → Build Android APK → Artifacts"
          echo "================================"
